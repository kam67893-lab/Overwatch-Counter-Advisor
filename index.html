<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OW Counter Advisor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0c12;
    --surface: #111520;
    --surface2: #181d2e;
    --border: #1e2540;
    --accent: #f99e1a;
    --accent2: #4d9fff;
    --text: #e8eaf0;
    --muted: #6b7394;
    --tank: #4d9fff;
    --damage: #ff4d6d;
    --support: #4dffa0;
    --selected-bg: #1a2035;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0d1220 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-inner {
    width: 14px;
    height: 14px;
    background: var(--bg);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  header span {
    color: var(--accent);
  }

  /* MAIN */
  main {
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* TEAM SLOTS */
  .team-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .team-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.06em;
  }

  .team-title.enemy { color: var(--damage); }
  .team-title.ally { color: var(--accent2); }

  .slot-count {
    font-size: 11px;
    color: var(--muted);
  }

  .slots {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slot {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    min-height: 42px;
  }

  .slot:hover {
    border-color: var(--muted);
  }

  .slot.filled {
    border-color: var(--border);
    background: var(--selected-bg);
  }

  .slot.filled.enemy-slot {
    border-left: 2px solid var(--damage);
  }

  .slot.filled.ally-slot {
    border-left: 2px solid var(--accent2);
  }

  .slot-role-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .slot-role-dot.tank { background: var(--tank); }
  .slot-role-dot.damage { background: var(--damage); }
  .slot-role-dot.support { background: var(--support); }

  .slot-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .slot-name.placeholder {
    color: var(--muted);
    font-weight: 400;
    font-style: italic;
  }

  .slot-remove {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }

  .slot-remove:hover {
    background: #ff4d6d22;
    border-color: var(--damage);
    color: var(--damage);
  }

  /* PICKER MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.open {
    display: flex;
  }

  .picker-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .picker-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .picker-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
    flex: 1;
  }

  .picker-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .picker-search {
    margin: 0 16px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    width: calc(100% - 32px);
    outline: none;
    flex-shrink: 0;
  }

  .picker-search:focus {
    border-color: var(--accent2);
  }

  .role-tabs {
    display: flex;
    gap: 0;
    padding: 0 16px 10px;
    flex-shrink: 0;
  }

  .role-tab {
    flex: 1;
    padding: 6px 4px;
    font-size: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .role-tab:first-child { border-radius: 6px 0 0 6px; }
  .role-tab:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .role-tab:not(:first-child):not(:last-child) { border-left: none; }

  .role-tab.active.all { background: #1a2035; border-color: var(--accent2); color: var(--text); }
  .role-tab.active.tank { background: #0d1e35; border-color: var(--tank); color: var(--tank); }
  .role-tab.active.damage { background: #2a0f18; border-color: var(--damage); color: var(--damage); }
  .role-tab.active.support { background: #0d2a1a; border-color: var(--support); color: var(--support); }

  .hero-list {
    overflow-y: auto;
    padding: 0 16px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .hero-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    min-height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    transition: border-color 0.1s, background 0.1s;
    text-align: left;
  }

  .hero-btn:hover {
    background: var(--selected-bg);
    border-color: var(--muted);
  }

  .hero-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .hero-dot.tank { background: var(--tank); }
  .hero-dot.damage { background: var(--damage); }
  .hero-dot.support { background: var(--support); }

  /* ANALYZE BUTTON */
  .analyze-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .analyze-btn:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .analyze-btn:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
  }

  /* RESULT */
  .result-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }

  .result-block.visible { display: block; }

  .result-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.06em;
    color: var(--accent);
    flex: 1;
  }

  .result-body {
    padding: 14px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  .loading-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 18px 14px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  .error-msg {
    padding: 14px;
    color: var(--damage);
    font-size: 13px;
  }

  /* CLEAR BTN */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 10px;
    border: none;
    border-radius: 6px;
    background: none;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .mode-btn.active.standard { color: var(--accent2); }
  .mode-btn.active.stadium  { color: var(--accent); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px 16px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark"><div class="logo-inner"></div></div>
  <h1>OW <span>COUNTER</span> ADVISOR</h1>
</header>

<main>

  <!-- MODE TOGGLE -->
  <div>
    <div class="mode-label">Game Mode</div>
    <div class="mode-toggle">
      <button class="mode-btn active standard" id="btn-standard" onclick="setMode('standard')">Standard</button>
      <button class="mode-btn stadium" id="btn-stadium" onclick="setMode('stadium')">Stadium</button>
    </div>
  </div>

  <!-- ENEMY TEAM -->
  <div>
    <div class="section-label">Enemy Composition</div>
    <div class="team-block">
      <div class="team-header">
        <span class="team-title enemy">Enemy Team</span>
        <span class="slot-count" id="enemy-count">0 / 5 heroes</span>
      </div>
      <div class="slots" id="enemy-slots"></div>
    </div>
  </div>

  <!-- ALLY TEAM -->
  <div>
    <div class="section-label" id="ally-section-label">Your Team Locks <span style="color:var(--muted);font-size:10px;">(optional)</span></div>
    <div class="team-block">
      <div class="team-header">
        <span class="team-title ally" id="ally-section-title">Your Team</span>
        <span class="slot-count" id="ally-count">0 / 5 heroes</span>
      </div>
      <div class="slots" id="ally-slots"></div>
    </div>
  </div>

  <button class="analyze-btn" id="analyze-btn" disabled>ANALYZE & COUNTER</button>

  <!-- RESULT -->
  <div class="result-block" id="result-block">
    <div class="result-header">
      <span class="result-title">▶ COUNTER ANALYSIS</span>
      <button class="clear-btn" id="clear-result-btn">Clear</button>
    </div>
    <div id="result-loading" class="loading-dots" style="display:none;">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div id="result-body" class="result-body"></div>
  </div>

</main>

<footer>Powered by Claude AI · Not affiliated with Blizzard</footer>

<!-- HERO PICKER MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="picker-sheet">
    <div class="picker-header">
      <span class="picker-title" id="picker-title">SELECT HERO</span>
      <button class="picker-close" id="picker-close">✕</button>
    </div>
    <input class="picker-search" id="picker-search" type="text" placeholder="Search heroes…" autocomplete="off" inputmode="search">
    <div class="role-tabs">
      <button class="role-tab active all" data-role="all">All</button>
      <button class="role-tab tank" data-role="tank">Tank</button>
      <button class="role-tab damage" data-role="damage">DPS</button>
      <button class="role-tab support" data-role="support">Support</button>
    </div>
    <div class="hero-list" id="hero-list"></div>
  </div>
</div>

<script>
// ── HERO ROSTER ──────────────────────────────────────────────────────
const HEROES = [
  // Tanks
  { name: "D.Va",         role: "tank" },
  { name: "Domina",       role: "tank" },
  { name: "Doomfist",     role: "tank" },
  { name: "Hazard",       role: "tank" },
  { name: "Junker Queen", role: "tank" },
  { name: "Mauga",        role: "tank" },
  { name: "Orisa",        role: "tank" },
  { name: "Ramattra",     role: "tank" },
  { name: "Reinhardt",    role: "tank" },
  { name: "Roadhog",      role: "tank" },
  { name: "Sigma",        role: "tank" },
  { name: "Winston",      role: "tank" },
  { name: "Wrecking Ball",role: "tank" },
  { name: "Zarya",        role: "tank" },
  // Damage
  { name: "Anran",        role: "damage" },
  { name: "Ashe",         role: "damage" },
  { name: "Bastion",      role: "damage" },
  { name: "Cassidy",      role: "damage" },
  { name: "Echo",         role: "damage" },
  { name: "Emre",         role: "damage" },
  { name: "Freja",        role: "damage" },
  { name: "Genji",        role: "damage" },
  { name: "Hanzo",        role: "damage" },
  { name: "Junkrat",      role: "damage" },
  { name: "Mei",          role: "damage" },
  { name: "Pharah",       role: "damage" },
  { name: "Reaper",       role: "damage" },
  { name: "Shion",        role: "damage" },
  { name: "Sierra",       role: "damage" },
  { name: "Sojourn",      role: "damage" },
  { name: "Soldier: 76",  role: "damage" },
  { name: "Sombra",       role: "damage" },
  { name: "Symmetra",     role: "damage" },
  { name: "Torbjörn",     role: "damage" },
  { name: "Tracer",       role: "damage" },
  { name: "Vendetta",     role: "damage" },
  { name: "Venture",      role: "damage" },
  { name: "Widowmaker",   role: "damage" },
  // Support
  { name: "Ana",          role: "support" },
  { name: "Baptiste",     role: "support" },
  { name: "Brigitte",     role: "support" },
  { name: "Illari",       role: "support" },
  { name: "Jetpack Cat",  role: "support" },
  { name: "Juno",         role: "support" },
  { name: "Kiriko",       role: "support" },
  { name: "Lifeweaver",   role: "support" },
  { name: "Lúcio",        role: "support" },
  { name: "Mercy",        role: "support" },
  { name: "Mizuki",       role: "support" },
  { name: "Moira",        role: "support" },
  { name: "Wuyang",       role: "support" },
  { name: "Zenyatta",     role: "support" },
];

// ── STATE ─────────────────────────────────────────────────────────────
const MAX = 5;
let enemyTeam = [];
let allyTeam  = [];
let activeTeam = null; // 'enemy' | 'ally'
let activeSlotIndex = null;
let pickerRole = 'all';
let currentMode = 'standard'; // 'standard' | 'stadium'

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-standard').className = 'mode-btn' + (mode === 'standard' ? ' active standard' : '');
  document.getElementById('btn-stadium').className  = 'mode-btn' + (mode === 'stadium'  ? ' active stadium'  : '');

  const label = document.getElementById('ally-section-label');
  const title = document.getElementById('ally-section-title');
  if (mode === 'stadium') {
    label.innerHTML = 'Your Locked Heroes <span style="color:var(--accent);font-size:10px;">(required for build advice)</span>';
    title.textContent = 'Your Team';
  } else {
    label.innerHTML = 'Your Team Locks <span style="color:var(--muted);font-size:10px;">(optional)</span>';
    title.textContent = 'Your Team';
  }
}

// ── INIT SLOTS ────────────────────────────────────────────────────────
function initSlots() {
  renderSlots('enemy');
  renderSlots('ally');
}

function renderSlots(team) {
  const arr = team === 'enemy' ? enemyTeam : allyTeam;
  const container = document.getElementById(`${team}-slots`);
  const countEl   = document.getElementById(`${team}-count`);
  container.innerHTML = '';
  countEl.textContent = `${arr.length} / ${MAX} heroes`;

  for (let i = 0; i < Math.max(arr.length + 1, 1); i++) {
    const hero = arr[i];
    const slot = document.createElement('div');
    slot.className = `slot ${hero ? 'filled ' + team + '-slot' : ''}`;

    if (hero) {
      const dot = document.createElement('div');
      dot.className = `slot-role-dot ${hero.role}`;

      const name = document.createElement('span');
      name.className = 'slot-name';
      name.textContent = hero.name;

      const rm = document.createElement('button');
      rm.className = 'slot-remove';
      rm.textContent = '✕';
      rm.addEventListener('click', (e) => {
        e.stopPropagation();
        if (team === 'enemy') enemyTeam.splice(i, 1);
        else allyTeam.splice(i, 1);
        renderSlots(team);
        updateAnalyzeBtn();
      });

      slot.appendChild(dot);
      slot.appendChild(name);
      slot.appendChild(rm);
    } else {
      if (arr.length >= MAX) return;
      const dot = document.createElement('div');
      dot.className = 'slot-role-dot';

      const ph = document.createElement('span');
      ph.className = 'slot-name placeholder';
      ph.textContent = `+ Add hero ${arr.length + 1}`;

      slot.appendChild(dot);
      slot.appendChild(ph);
      slot.addEventListener('click', () => openPicker(team, i));
    }
    container.appendChild(slot);
  }
}

function updateAnalyzeBtn() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = enemyTeam.length === 0;
}

// ── PICKER ────────────────────────────────────────────────────────────
function openPicker(team, slotIndex) {
  activeTeam = team;
  activeSlotIndex = slotIndex;
  pickerRole = 'all';

  const title = document.getElementById('picker-title');
  title.textContent = team === 'enemy' ? 'SELECT ENEMY HERO' : 'SELECT YOUR HERO';

  document.getElementById('picker-search').value = '';
  document.querySelectorAll('.role-tab').forEach(t => {
    t.classList.remove('active');
    if (t.dataset.role === 'all') t.classList.add('active');
  });

  renderHeroList('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closePicker() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderHeroList(query) {
  const taken = [...enemyTeam, ...allyTeam].map(h => h.name);
  const list = document.getElementById('hero-list');
  list.innerHTML = '';

  const filtered = HEROES.filter(h => {
    const roleMatch = pickerRole === 'all' || h.role === pickerRole;
    const nameMatch = h.name.toLowerCase().includes(query.toLowerCase());
    const notTaken  = !taken.includes(h.name);
    return roleMatch && nameMatch && notTaken;
  });

  filtered.forEach(hero => {
    const btn = document.createElement('button');
    btn.className = 'hero-btn';

    const dot = document.createElement('div');
    dot.className = `hero-dot ${hero.role}`;

    const name = document.createElement('span');
    name.textContent = hero.name;

    btn.appendChild(dot);
    btn.appendChild(name);
    btn.addEventListener('click', () => selectHero(hero));
    list.appendChild(btn);
  });

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--muted);font-size:13px;padding:8px 4px;grid-column:1/-1;';
    empty.textContent = 'No heroes match.';
    list.appendChild(empty);
  }
}

function selectHero(hero) {
  if (activeTeam === 'enemy') {
    enemyTeam.push(hero);
  } else {
    allyTeam.push(hero);
  }
  renderSlots(activeTeam);
  updateAnalyzeBtn();
  closePicker();
}

// ── EVENTS ────────────────────────────────────────────────────────────
document.getElementById('picker-close').addEventListener('click', closePicker);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closePicker();
});

document.getElementById('picker-search').addEventListener('input', (e) => {
  renderHeroList(e.target.value);
});

document.querySelectorAll('.role-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    pickerRole = tab.dataset.role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderHeroList(document.getElementById('picker-search').value);
  });
});

document.getElementById('clear-result-btn').addEventListener('click', () => {
  document.getElementById('result-block').classList.remove('visible');
});

  const stadiumContext = `STADIUM MODE RULES:

  const prompt = currentMode === 'stadium'

${allyList}

YOUR TASK: The user's team is already locked in. Do NOT suggest hero swaps or new heroes to pick. Instead, give each locked hero a specific counter-build path to beat the enemy comp. If no ally heroes are provided, give general build advice for countering this enemy comp on any hero.

Respond in EXACTLY this format with no extra commentary before or after:

THREAT ANALYSIS
